<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Perfa-Pik</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; color: #FFF; margin: 0; font-family: var(--font-main); }
        .checkout-container { display: grid; grid-template-columns: 1.2fr 1fr; min-height: 100vh; }
        @media(max-width: 1024px) { .checkout-container { grid-template-columns: 1fr; display: flex; flex-direction: column-reverse; } }
        
        /* Left Column (Forms) */
        .checkout-left { padding: 80px 10%; background: #050505; display: flex; flex-direction: column; align-items: flex-end; }
        .checkout-left-inner { max-width: 600px; width: 100%; }
        
        .checkout-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 60px; }
        .checkout-logo { font-family: var(--font-heading); font-size: 24px; font-weight: 800; color: #FFF; text-decoration: none; }
        
        .form-section { margin-bottom: 40px; reveal; }
        .form-title { font-family: var(--font-heading); font-size: 20px; font-weight: 400; color: #FFF; margin-bottom: 24px; }
        
        .input-group { position: relative; margin-bottom: 16px; }
        .float-input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 20px 16px 10px; border-radius: 8px; color: #FFF; font-size: 15px; font-family: var(--font-main); transition: all 0.3s; box-sizing: border-box; }
        .float-input:focus { outline: none; border-color: rgba(201, 169, 110, 0.5); background: rgba(255,255,255,0.05); }
        .float-label { position: absolute; left: 16px; top: 16px; color: rgba(255,255,255,0.4); font-size: 15px; transition: all 0.2s; pointer-events: none; }
        .float-input:focus ~ .float-label, .float-input:not(:placeholder-shown) ~ .float-label { top: 8px; font-size: 11px; color: rgba(201, 169, 110, 0.8); }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        .btn-pay { width: 100%; background: #FFF; color: #000; font-family: var(--font-heading); font-size: 18px; font-weight: 600; padding: 20px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1); margin-top: 20px; }
        .btn-pay:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
        
        /* Right Column (Summary & Upsell) */
        .checkout-right { padding: 80px 10%; background: #0a0a0a; border-left: 1px solid rgba(255,255,255,0.05); }
        @media(max-width: 1024px) { .checkout-right { border-left: none; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 40px; } }
        
        .cart-item { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; position: relative; }
        .cart-img-box { position: relative; width: 64px; height: 64px; background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .cart-img-box img { width: 100%; height: 100%; object-fit: contain; padding: 4px; }
        .cart-qty { position: absolute; top: -8px; right: -8px; background: rgba(201, 169, 110, 0.9); color: #000; font-size: 12px; font-weight: 700; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .cart-details { flex-grow: 1; }
        .cart-title { font-size: 15px; font-weight: 500; color: #FFF; margin-bottom: 4px; }
        .cart-desc { font-size: 13px; color: rgba(255,255,255,0.4); }
        .cart-price { font-size: 15px; font-weight: 500; color: #FFF; }
        
        .summary-totals { border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 24px 0; margin-bottom: 40px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; color: rgba(255,255,255,0.6); }
        .summary-row.total { font-size: 24px; color: #FFF; font-family: var(--font-heading); margin-bottom: 0; margin-top: 24px; font-weight: 400; }
        .summary-row.total span { color: #FFF; }

        /* The Upsell Engine */
        .upsell-section { margin-top: 40px; }
        .upsell-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .upsell-title { font-family: var(--font-heading); font-size: 16px; color: rgba(201, 169, 110, 1); letter-spacing: 0.1em; text-transform: uppercase; margin: 0; }
        .upsell-line { flex-grow: 1; height: 1px; background: rgba(201, 169, 110, 0.2); }
        
        .upsell-card { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 12px; margin-bottom: 16px; transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1); }
        .upsell-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .upsell-img { width: 48px; height: 48px; object-fit: contain; }
        .upsell-info { flex-grow: 1; }
        .upsell-name { font-size: 14px; color: #FFF; font-weight: 500; margin-bottom: 2px; }
        .upsell-price { font-size: 13px; color: rgba(255,255,255,0.5); }
        .btn-add { background: rgba(255,255,255,0.1); border: none; color: #FFF; font-size: 12px; padding: 6px 16px; border-radius: 30px; cursor: pointer; transition: all 0.3s; }
        .btn-add:hover { background: #FFF; color: #000; }
        
        .trust-badges { display: flex; justify-content: center; gap: 20px; margin-top: 40px; opacity: 0.3; }
        .trust-badges svg { height: 24px; fill: #FFF; }
    </style>
</head>
<body>

<div class="checkout-container">
    
    <!-- LEFT: FORMS -->
    <div class="checkout-left">
        <div class="checkout-left-inner">
            <div class="checkout-header reveal">
                <a href="index.html" class="checkout-logo">Perfa-Pik.</a>
                <a href="shop.html" style="color: rgba(255,255,255,0.4); text-decoration: none; font-size: 14px; transition: color 0.3s;">&larr; Return to shop</a>
            </div>
            
            <div class="form-section reveal" style="transition-delay: 0.1s;">
                <h3 class="form-title">Contact Information</h3>
                <div class="input-group">
                    <input type="email" class="float-input" id="email" placeholder=" ">
                    <label for="email" class="float-label">Email address</label>
                </div>
            </div>
            
            <div class="form-section reveal" style="transition-delay: 0.2s;">
                <h3 class="form-title">Shipping Address</h3>
                <div class="grid-2">
                    <div class="input-group">
                        <input type="text" class="float-input" id="fname" placeholder=" ">
                        <label for="fname" class="float-label">First name</label>
                    </div>
                    <div class="input-group">
                        <input type="text" class="float-input" id="lname" placeholder=" ">
                        <label for="lname" class="float-label">Last name</label>
                    </div>
                </div>
                <div class="input-group">
                    <input type="text" class="float-input" id="address" placeholder=" ">
                    <label for="address" class="float-label">Address</label>
                </div>
                <div class="grid-2">
                    <div class="input-group">
                        <input type="text" class="float-input" id="city" placeholder=" ">
                        <label for="city" class="float-label">City</label>
                    </div>
                    <div class="input-group">
                        <input type="text" class="float-input" id="postcode" placeholder=" ">
                        <label for="postcode" class="float-label">Postcode</label>
                    </div>
                </div>
            </div>
            
            <div class="form-section reveal" style="transition-delay: 0.3s;">
                <h3 class="form-title">Payment</h3>
                <div class="input-group">
                    <input type="text" class="float-input" id="card" placeholder=" ">
                    <label for="card" class="float-label">Card number</label>
                </div>
                <div class="grid-2">
                    <div class="input-group">
                        <input type="text" class="float-input" id="exp" placeholder=" ">
                        <label for="exp" class="float-label">Expiration date (MM/YY)</label>
                    </div>
                    <div class="input-group">
                        <input type="password" class="float-input" id="cvc" placeholder=" ">
                        <label for="cvc" class="float-label">Security code</label>
                    </div>
                </div>
                
                <button class="btn-pay">Pay securely &pound;299.00</button>
            </div>
            
        </div>
    </div>
    
    <!-- RIGHT: SUMMARY & UPSELL -->
    <div class="checkout-right">
        <div class="reveal" style="transition-delay: 0.1s;">
            <!-- Cart Item -->
            <div class="cart-item">
                <div class="cart-img-box">
                    <div class="cart-qty">1</div>
                    <img src="assets/images/product_profile.jpg" alt="Non-Tripod">
                </div>
                <div class="cart-details">
                    <div class="cart-title">The Non-Tripod</div>
                    <div class="cart-desc">Base Unit Core</div>
                </div>
                <div class="cart-price">&pound;299.00</div>
            </div>
            
            <div class="summary-totals">
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span>&pound;299.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span>&pound;299.00</span>
                </div>
            </div>
            
            <!-- Highly Visual Upsell Engine -->
            <div class="upsell-section reveal" style="transition-delay: 0.3s;">
                <div class="upsell-header">
                    <h4 class="upsell-title">Complete Your Rig</h4>
                    <div class="upsell-line"></div>
                </div>
                
                <div class="upsell-card">
                    <img src="assets/images/octopus-1.png" alt="The Octopus" class="upsell-img">
                    <div class="upsell-info">
                        <div class="upsell-name">The Octopus Hub</div>
                        <div class="upsell-price">&pound;149.00</div>
                    </div>
                    <button class="btn-add">Add</button>
                </div>
                
                <div class="upsell-card">
                    <img src="assets/images/twist_lok_sleeve.jpg" alt="Solo Chronos" class="upsell-img">
                    <div class="upsell-info">
                        <div class="upsell-name">Solo Chronos</div>
                        <div class="upsell-price">&pound;89.00</div>
                    </div>
                    <button class="btn-add">Add</button>
                </div>
            </div>
            
            <div class="trust-badges reveal" style="transition-delay: 0.4s;">
                <svg viewBox="0 0 50 30"><path d="M25 0c-13.8 0-25 11.2-25 25h50c0-13.8-11.2-25-25-25z"></path></svg>
                <div style="font-size: 11px; padding-top: 4px; letter-spacing: 0.05em;">256-BIT ENCRYPTED CHECKOUT</div>
            </div>
            
        </div>
    </div>
    
</div>

<script src="script.js"></script>
</body>
</html>
