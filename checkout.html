<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Perfa-Pik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f5f5f7;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #1d1d1f;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .checkout-nav {
            height: 60px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #d2d2d7;
            font-weight: 600;
            font-size: 20px;
            letter-spacing: -0.01em;
            position: relative;
        }
        
        .checkout-nav a {
            position: absolute;
            left: 20px;
            color: #0071e3;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .checkout-container {
            max-width: 900px;
            margin: 60px auto 120px;
            display: flex;
            gap: 60px;
            padding: 0 20px;
        }

        @media (max-width: 768px) {
            .checkout-container {
                flex-direction: column-reverse; /* Form under summary on mobile */
                margin-top: 40px;
            }
        }

        .col-form {
            flex: 1.8;
        }

        .col-summary {
            flex: 1;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 30px;
            margin-top: 0;
        }

        .apple-express {
            background: #000;
            color: #fff;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-size: 19px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 24px;
            font-family: -apple-system, sans-serif;
            transition: transform 0.2s;
        }
        
        .apple-express:hover {
            transform: scale(1.01);
        }
        
        .apple-express span {
            font-weight: 600;
        }

        .divider {
            text-align: center;
            margin: 32px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            width: 35%; height: 1px;
            background: #d2d2d7;
        }

        .divider::after {
            content: '';
            position: absolute;
            right: 0; top: 50%;
            width: 35%; height: 1px;
            background: #d2d2d7;
        }
        
        @media(min-width: 768px){
            .divider::before, .divider::after { width: 40%; }
        }
        
        .divider span {
            color: #86868b;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }
        
        @media(max-width: 480px) {
            .form-row { flex-direction: column; gap: 16px; }
        }

        .form-row .form-group {
            flex: 1;
        }

        input {
            width: 100%;
            padding: 18px 16px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            font-size: 17px;
            color: #1d1d1f;
            box-sizing: border-box;
            background: #fff;
            transition: border 0.3s, box-shadow 0.3s;
        }
        
        input::placeholder {
            color: #86868b;
        }

        input:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
        }

        .btn-submit {
            background: #0071e3;
            color: #fff;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 400;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background: #0077ED;
        }
        
        /* Summary Box */
        .summary-card {
            background: #fff;
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            position: sticky;
            top: 40px;
        }

        .summary-card h3 {
            margin-top: 0;
            font-size: 21px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
            color: #1d1d1f;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #d2d2d7;
            font-size: 21px;
            font-weight: 600;
        }

        .small-img {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            object-fit: cover;
            vertical-align: middle;
            margin-right: 12px;
            border: 1px solid #d2d2d7;
        }
    </style>
</head>
<body>

    <nav class="checkout-nav">
        <a href="shop.html">Bag</a>
        Checkout
    </nav>

    <div class="checkout-container">
        
        <div class="col-form">
            <h2>Where should we send your order?</h2>
            
            <div class="apple-express">
                Checkout with <span> Pay</span>
            </div>

            <div class="divider">
                <span>OR ENTER DETAILS</span>
            </div>

            <form action="#">
                <h3 style="font-size: 17px; margin-bottom: 16px;">Contact</h3>
                <div class="form-row">
                    <div class="form-group"><input type="text" placeholder="First Name"></div>
                    <div class="form-group"><input type="text" placeholder="Last Name"></div>
                </div>
                <div class="form-group">
                    <input type="email" placeholder="Email Address">
                </div>
                <div class="form-group" style="margin-bottom: 40px;">
                    <input type="tel" placeholder="Phone Number">
                </div>

                <h3 style="font-size: 17px; margin-bottom: 16px;">Shipping</h3>
                <div class="form-group">
                    <input type="text" placeholder="Street Address">
                </div>
                <div class="form-group">
                    <input type="text" placeholder="Apt, Suite, etc. (Optional)">
                </div>
                <div class="form-row">
                    <div class="form-group"><input type="text" placeholder="City"></div>
                    <div class="form-group">
                        <input type="text" placeholder="State/County">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><input type="text" placeholder="ZIP / Postal Code"></div>
                    <div class="form-group"><input type="text" placeholder="Country" value="United Kingdom"></div>
                </div>
                
                <h3 style="font-size: 17px; margin-top: 40px; margin-bottom: 16px;">Payment</h3>
                <div style="border: 1px solid #d2d2d7; border-radius: 12px; overflow: hidden; margin-bottom: 16px; background: #fff;">
                    <input type="text" placeholder="Card Number" style="border:none; border-radius:0; border-bottom: 1px solid #d2d2d7;">
                    <div style="display: flex;">
                        <input type="text" placeholder="MM/YY" style="border:none; border-radius:0; border-right: 1px solid #d2d2d7; width: 50%;">
                        <input type="text" placeholder="CVV" style="border:none; border-radius:0; width: 50%;">
                    </div>
                </div>

                <button class="btn-submit" type="button" onclick="alert('Order successfully processed! (This is a mock checkout flow)')">Place Order</button>
            </form>
        </div>

        <div class="col-summary">
            <div class="summary-card">
                <h3>Order Summary</h3>
                
                <div style="display: flex; align-items: center; margin-bottom: 24px;">
                    <img src="assets/images/product_profile.jpg" alt="Non-Tripod" class="small-img">
                    <div style="flex-grow: 1;">
                        <div style="font-weight: 500; font-size: 14px;">Non-Tripod System</div>
                        <div style="color: #86868b; font-size: 12px;">Pre-order / Ships in 4 weeks</div>
                    </div>
                </div>

                <div class="summary-item">
                    <span>Subtotal</span>
                    <span id="summ-subtotal">$149.00</span>
                </div>
                <div class="summary-item">
                    <span>Shipping</span>
                    <span>FREE</span>
                </div>
                <div class="summary-item">
                    <span>Estimated Tax</span>
                    <span>Calculated at next step</span>
                </div>

                <div class="summary-total">
                    <span>Total</span>
                    <span id="summ-total">$149.00</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Load dynamically saved price from shop page
        document.addEventListener('DOMContentLoaded', () => {
            const storedTotal = localStorage.getItem('cartTotal');
            if (storedTotal) {
                document.getElementById('summ-subtotal').innerText = '$' + storedTotal + '.00';
                document.getElementById('summ-total').innerText = '$' + storedTotal + '.00';
            }
        });
    </script>
</body>
</html>
